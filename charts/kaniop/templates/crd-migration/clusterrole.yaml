{{- if .Values.crdMigration.personAccountPlural.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kaniop.fullname" . }}-crd-migrator
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-30"
    "helm.sh/hook-delete-policy": before-hook-creation
  labels:
    {{- include "kaniop.crdMigration.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - get
      - create
      - delete
      - watch
  - apiGroups:
      - kaniop.rs
    resources:
      - kanidmpersonsaccounts
      - kanidmpersonaccounts
    verbs:
      - get
      - list
      - watch
      - create
      - patch
  - apiGroups:
      - apps
    resources:
      - deployments
      - deployments/scale
    resourceNames:
      - {{ include "kaniop.fullname" . }}
    verbs:
      - get
      - patch
      - update
{{- end }}
