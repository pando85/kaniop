# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: test webhook create secret job
templates:
  - templates/webhook/job-patch/job-create-secret.yaml
tests:
  - it: Should not render when webhook is disabled
    release:
      name: kaniop
      namespace: kaniop
    set:
      webhook.enabled: false
      webhook.patch.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: Should not render when patch is disabled
    release:
      name: kaniop
      namespace: kaniop
    set:
      webhook.enabled: true
      webhook.patch.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: Should not render when certManager is enabled
    release:
      name: kaniop
      namespace: kaniop
    set:
      webhook.enabled: true
      webhook.patch.enabled: true
      webhook.certManager.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: Should render with default cluster domain
    release:
      name: kaniop
      namespace: kaniop
    set:
      webhook.enabled: true
      webhook.patch.enabled: true
      webhook.certManager.enabled: false
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: kind
          value: Job
      - equal:
          path: spec.ttlSecondsAfterFinished
          value: 300
      - matchRegex:
          path: spec.template.spec.containers[0].args[1]
          pattern: ".*svc\\.cluster\\.local$"

  - it: Should render with custom cluster domain
    release:
      name: kaniop
      namespace: kaniop
    set:
      webhook.enabled: true
      webhook.patch.enabled: true
      webhook.certManager.enabled: false
      clusterDomain: mycluster.example.com
    asserts:
      - hasDocuments:
          count: 1
      - matchRegex:
          path: spec.template.spec.containers[0].args[1]
          pattern: ".*svc\\.mycluster\\.example\\.com$"
